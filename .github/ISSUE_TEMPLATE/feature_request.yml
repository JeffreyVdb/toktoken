name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do that TokToken doesn't support well today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this should work? Include CLI syntax, MCP tool behavior, or expected output format if applicable.
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: What part of TokToken does this affect?
      options:
        - CLI
        - MCP server
        - Both CLI and MCP
        - Indexing / performance
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any workarounds or alternative approaches?
    validations:
      required: false
